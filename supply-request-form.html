<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบฟอร์มเบิกอุปกรณ์สำนักงาน | Office Supply Request</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600&family=Noto+Sans+Myanmar:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Noto Sans Thai','Noto Sans Myanmar',sans-serif;background:#f1f5f9}
.card{background:white;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,0.08)}
.lang-btn{padding:6px 14px;border-radius:8px;border:1px solid #ddd;font-size:14px}
.lang-active{background:#4f46e5;color:white;border-color:#4f46e5}
.chip{display:inline-flex;align-items:center;gap:6px;background:#eef2ff;color:#3730a3;border-radius:999px;padding:4px 10px;font-size:13px;margin:3px}
.chip button{color:#dc2626;font-weight:700;line-height:1}
</style>

</head>

<body class="p-6">

<div class="max-w-5xl mx-auto">

<div id="errorBanner" class="hidden mb-4 text-sm bg-red-50 border border-red-300 text-red-800 rounded-lg p-3"></div>

<div class="flex justify-between items-center mb-6">
<h1 id="title" class="text-2xl font-semibold">แบบฟอร์มเบิกอุปกรณ์สำนักงาน</h1>
<div class="flex gap-2">
<button onclick="setLang('th')" id="btn-th" class="lang-btn lang-active">ไทย</button>
<button onclick="setLang('mm')" id="btn-mm" class="lang-btn">မြန်မာ</button>
</div>
</div>

<div class="card p-6 mb-6">
<div id="editingBanner" class="hidden mb-4 text-sm bg-amber-50 border border-amber-300 text-amber-800 rounded-lg p-3 flex justify-between items-center">
<span id="editingBannerText">กำลังแก้ไขรายการ</span>
<button type="button" onclick="cancelEdit()" id="btn-cancel-edit" class="text-amber-800 underline">ยกเลิก</button>
</div>

<form id="request-form" class="space-y-4">

<div>
<label id="lbl-dept" class="text-sm font-medium">แผนก</label>
<input id="department" class="mt-1 w-full border rounded-lg p-2" placeholder="เช่น บัญชี" required>
</div>

<div>
<label id="lbl-items" class="text-sm font-medium">รายการที่ต้องการเบิก</label>
<div class="mt-1 flex gap-2">
<input id="itemNameInput" class="flex-1 border rounded-lg p-2" placeholder="ชื่อรายการ เช่น กระดาษ A4">
<input id="itemQtyInput" type="number" min="1" class="w-24 border rounded-lg p-2" placeholder="จำนวน">
<button type="button" onclick="addItem()" id="btn-add-item" class="bg-indigo-100 text-indigo-700 px-3 rounded-lg whitespace-nowrap">+ เพิ่ม</button>
</div>
<div id="itemsChips" class="mt-2"></div>
</div>

<div>
<label id="lbl-name" class="text-sm font-medium">ชื่อผู้เบิก</label>
<input id="requesterName" class="mt-1 w-full border rounded-lg p-2" required>
</div>

<button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700" id="btn-submit">ส่งรายการ</button>

</form>
</div>

<div class="flex justify-end gap-2 mb-4">
<button onclick="downloadCSV()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm" id="btn-download">ดาวน์โหลด</button>
<button onclick="deleteAll()" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm" id="btn-deleteall">ลบทั้งหมด</button>
</div>

<div class="card p-6">
<h2 id="title-list" class="text-lg font-semibold mb-4">รายการเบิกทั้งหมด</h2>

<div class="overflow-x-auto">
<table class="w-full text-sm">
<thead class="border-b bg-gray-50">
<tr>
<th class="p-2 text-left" id="th-name">ชื่อ</th>
<th class="p-2 text-left" id="th-dept">แผนก</th>
<th class="p-2 text-left" id="th-items">รายการ</th>
<th class="p-2 text-left" id="th-status">สถานะ</th>
<th class="p-2 text-left" id="th-time">เวลา</th>
<th class="p-2 text-left" id="th-action">การดำเนินการ</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

</div>

<!-- Firebase COMPAT SDK: regular scripts, not ES modules.
     This is what lets the page run when opened directly as a local file (file://),
     unlike the modular v9 SDK (type="module" + import) which browsers block for local files. -->
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
 apiKey:"AIzaSyASVRfcI29rcxgzQuOC6R-CMT7X7vBWg_g",
 authDomain:"onlinetoolbox-d7c04.firebaseapp.com",
 projectId:"onlinetoolbox-d7c04",
 storageBucket:"onlinetoolbox-d7c04.appspot.com",
 messagingSenderId:"873410566683",
 appId:"1:873410566683:web:6c7e3058085b09acb036be"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

const collectionPath="supply-requests";
const EDIT_PASSCODE="303647";

const form=document.getElementById("request-form");
const tableBody=document.getElementById("tableBody");

let formItems=[]; // {name, qty}
let editingId=null;
let latestDocs={}; // cache of docId -> data, for editing lookups
let currentLang="th";

function showError(msg){
 const el=document.getElementById("errorBanner");
 el.innerText="เชื่อมต่อระบบไม่สำเร็จ: "+msg;
 el.classList.remove("hidden");
 console.error(msg);
}

function currentLangText(){
 return lang[currentLang];
}

// ---------- auth then start listening ----------

auth.signInAnonymously().then(()=>{
 startListening();
}).catch(err=>{
 showError(err.code?`${err.code} - ${err.message}`:err.message);
});

// ---------- item chips ----------

function addItem(){
 const nameEl=document.getElementById("itemNameInput");
 const qtyEl=document.getElementById("itemQtyInput");

 const name=nameEl.value.trim();
 const qty=qtyEl.value.trim();

 if(!name||!qty||Number(qty)<=0){
 alert(currentLangText().fillItemAlert);
 return;
 }

 formItems.push({name,qty});
 nameEl.value="";
 qtyEl.value="";
 nameEl.focus();
 renderChips();
}

function renderChips(){
 const box=document.getElementById("itemsChips");
 box.innerHTML="";

 formItems.forEach((it,idx)=>{
 const chip=document.createElement("span");
 chip.className="chip";
 chip.innerHTML=`${it.name} (${it.qty}) <button type="button" data-idx="${idx}">×</button>`;
 chip.querySelector("button").onclick=()=>{
 formItems.splice(idx,1);
 renderChips();
 };
 box.appendChild(chip);
 });
}

// ---------- form submit (add or save edit) ----------

form.addEventListener("submit",async e=>{
 e.preventDefault();

 const department=document.getElementById("department").value.trim();
 const requesterName=document.getElementById("requesterName").value.trim();

 if(!department||!requesterName||formItems.length===0){
 alert(currentLangText().fillFormAlert);
 return;
 }

 try{
 if(editingId){
 await db.collection(collectionPath).doc(editingId).update({
 department,
 requesterName,
 itemsList:formItems
 });
 cancelEdit();
 }else{
 await db.collection(collectionPath).add({
 department,
 requesterName,
 itemsList:formItems,
 complete:false,
 timestamp:firebase.firestore.FieldValue.serverTimestamp()
 });
 }
 }catch(err){
 showError(err.code?`${err.code} - ${err.message}`:err.message);
 return;
 }

 form.reset();
 formItems=[];
 renderChips();
});

// ---------- editing flow with passcode ----------

function startEdit(id){
 const code=prompt(currentLangText().passcodePrompt);
 if(code===null)return;

 if(code!==EDIT_PASSCODE){
 alert(currentLangText().passcodeWrong);
 return;
 }

 const data=latestDocs[id];
 if(!data)return;

 document.getElementById("department").value=data.department||"";
 document.getElementById("requesterName").value=data.requesterName||"";
 formItems=Array.isArray(data.itemsList)?[...data.itemsList]:[];
 renderChips();

 editingId=id;

 document.getElementById("editingBanner").classList.remove("hidden");
 document.getElementById("btn-submit").innerText=currentLangText().saveEdit;

 window.scrollTo({top:0,behavior:"smooth"});
}

function cancelEdit(){
 editingId=null;
 formItems=[];
 renderChips();
 form.reset();
 document.getElementById("editingBanner").classList.add("hidden");
 document.getElementById("btn-submit").innerText=currentLangText().submit;
}

async function startDelete(id){
 const code=prompt(currentLangText().passcodePrompt);
 if(code===null)return;

 if(code!==EDIT_PASSCODE){
 alert(currentLangText().passcodeWrong);
 return;
 }

 if(!confirm(currentLangText().confirmDeleteOne))return;

 try{
 await db.collection(collectionPath).doc(id).delete();
 }catch(err){
 showError(err.code?`${err.code} - ${err.message}`:err.message);
 return;
 }

 if(editingId===id){
 cancelEdit();
 }
}

// ---------- realtime list ----------

function startListening(){

 db.collection(collectionPath).orderBy("timestamp","desc").onSnapshot(snap=>{
 tableBody.innerHTML="";
 latestDocs={};

 snap.forEach(d=>{
 const data=d.data();
 latestDocs[d.id]=data;

 const tr=document.createElement("tr");
 tr.className="border-b";

 const statusText=data.complete?"✅ ครบ":"⏳ รอดำเนินการ";
 const statusColor=data.complete?"bg-green-600":"bg-yellow-500";

 const time=data.timestamp?
 new Date(data.timestamp.toMillis()).toLocaleString():"-";

 const itemsDisplay=Array.isArray(data.itemsList)
 ?data.itemsList.map(it=>`${it.name} (${it.qty})`).join(", ")
 :(data.items||"-");

 tr.innerHTML=`
 <td class="p-2">${data.requesterName}</td>
 <td class="p-2">${data.department}</td>
 <td class="p-2">${itemsDisplay}</td>
 <td class="p-2">
 <button class="${statusColor} text-white px-2 py-1 rounded text-xs">${statusText}</button>
 </td>
 <td class="p-2">${time}</td>
 <td class="p-2 flex gap-2">
 <button class="bg-blue-600 text-white px-2 py-1 rounded text-xs action-complete">✔</button>
 <button class="bg-gray-500 text-white px-2 py-1 rounded text-xs action-pending">↺</button>
 <button class="bg-amber-500 text-white px-2 py-1 rounded text-xs action-edit">🔒✎</button>
 <button class="bg-red-600 text-white px-2 py-1 rounded text-xs action-delete">🔒🗑</button>
 </td>
 `;

 tr.querySelector(".action-complete").onclick=()=>{
 db.collection(collectionPath).doc(d.id).update({complete:true});
 };

 tr.querySelector(".action-pending").onclick=()=>{
 db.collection(collectionPath).doc(d.id).update({complete:false});
 };

 tr.querySelector(".action-edit").onclick=()=>{
 startEdit(d.id);
 };

 tr.querySelector(".action-delete").onclick=()=>{
 startDelete(d.id);
 };

 tableBody.appendChild(tr);
 });
 },err=>{
 showError(err.code?`${err.code} - ${err.message}`:err.message);
 });

}

// ---------- csv / delete all ----------

async function downloadCSV(){

 const snapshot=await db.collection(collectionPath).get();

 let csv="ชื่อ,แผนก,รายการ\n";

 snapshot.forEach(docSnap=>{
 const d=docSnap.data();
 const itemsDisplay=Array.isArray(d.itemsList)
 ?d.itemsList.map(it=>`${it.name} (${it.qty})`).join(" / ")
 :(d.items||"");
 csv+=`${d.requesterName},${d.department},"${itemsDisplay}"\n`;
 });

 const blob=new Blob([csv]);
 const url=URL.createObjectURL(blob);

 const a=document.createElement("a");
 a.href=url;
 a.download="supply.csv";
 a.click();

}

async function deleteAll(){

 if(!confirm(currentLangText().confirmDeleteAll))return;

 const snapshot=await db.collection(collectionPath).get();

 snapshot.forEach(d=>{
 d.ref.delete();
 });

}

</script>

<script>

const lang={

th:{
 title:"แบบฟอร์มเบิกอุปกรณ์สำนักงาน",
 dept:"แผนก",
 items:"รายการที่ต้องการเบิก",
 name:"ชื่อผู้เบิก",
 submit:"ส่งรายการ",
 saveEdit:"บันทึกการแก้ไข",
 list:"รายการเบิกทั้งหมด",
 thname:"ชื่อ",
 thdept:"แผนก",
 thitems:"รายการ",
 thstatus:"สถานะ",
 thtime:"เวลา",
 thaction:"การดำเนินการ",
 addItem:"+ เพิ่ม",
 download:"ดาวน์โหลด",
 deleteAll:"ลบทั้งหมด",
 editingBanner:"กำลังแก้ไขรายการนี้อยู่",

 passcodeWrong:"รหัสไม่ถูกต้อง",
 fillItemAlert:"กรุณากรอกชื่อรายการและจำนวน",
 fillFormAlert:"กรุณากรอกข้อมูลให้ครบและเพิ่มอย่างน้อย 1 รายการ",
 confirmDeleteAll:"ลบทั้งหมดหรือไม่",
 confirmDeleteOne:"ต้องการลบรายการนี้หรือไม่"
},

mm:{
 title:"ရုံးသုံးပစ္စည်း ထုတ်ယူရန် ဖောင်",
 dept:"ဌာန",
 items:"လိုအပ်သောပစ္စည်း",
 name:"တောင်းဆိုသူအမည်",
 submit:"တင်ပြရန်",
 saveEdit:"ပြင်ဆင်ချက်ကို သိမ်းရန်",
 list:"တောင်းဆိုမှုစာရင်း",
 thname:"အမည်",
 thdept:"ဌာန",
 thitems:"ပစ္စည်း",
 thstatus:"အခြေအနေ",
 thtime:"အချိန်",
 thaction:"လုပ်ဆောင်ချက်",
 addItem:"+ ထည့်ရန်",
 download:"ဒေါင်းလုဒ်",
 deleteAll:"အားလုံးဖျက်ရန်",
 editingBanner:"ဤစာရင်းကို ပြင်ဆင်နေသည်",
 cancelEdit:"ပယ်ဖျက်ရန်",
 passcodePrompt:"ပြင်ဆင်ရန် လျှို့ဝှက်ကုဒ်ထည့်ပါ",
 passcodeWrong:"ကုဒ်မှားနေသည်",
 fillItemAlert:"ပစ္စည်းအမည်နှင့်အရေအတွက်ကို ဖြည့်ပါ",
 fillFormAlert:"အချက်အလက်အားလုံးဖြည့်ပြီး ပစ္စည်းအနည်းဆုံး ၁ ခု ထည့်ပါ",
 confirmDeleteAll:"အားလုံးဖျက်မည်လား",
 confirmDeleteOne:"ဤစာရင်းကို ဖျက်မည်လား"
}

}

function setLang(l){

currentLang=l;
const t=lang[l]

document.getElementById('title').innerText=t.title
document.getElementById('lbl-dept').innerText=t.dept
document.getElementById('lbl-items').innerText=t.items
document.getElementById('lbl-name').innerText=t.name
document.getElementById('btn-submit').innerText = document.getElementById('editingBanner').classList.contains('hidden') ? t.submit : t.saveEdit
document.getElementById('title-list').innerText=t.list

document.getElementById('th-name').innerText=t.thname
document.getElementById('th-dept').innerText=t.thdept
document.getElementById('th-items').innerText=t.thitems
document.getElementById('th-status').innerText=t.thstatus
document.getElementById('th-time').innerText=t.thtime
document.getElementById('th-action').innerText=t.thaction

document.getElementById('btn-add-item').innerText=t.addItem
document.getElementById('btn-download').innerText=t.download
document.getElementById('btn-deleteall').innerText=t.deleteAll
document.getElementById('editingBannerText').innerText=t.editingBanner
document.getElementById('btn-cancel-edit').innerText=t.cancelEdit

document.getElementById('btn-th').classList.remove('lang-active')
document.getElementById('btn-mm').classList.remove('lang-active')

document.getElementById('btn-'+l).classList.add('lang-active')

}

</script>

</body>
</html>
